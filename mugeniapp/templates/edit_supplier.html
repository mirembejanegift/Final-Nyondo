<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supply Page</title>

    <style>


        nav {
      background-color: #1E3A8A;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav

           nav .logo {
      font-weight: bold;
      font-size: 1.2rem;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 1.5rem;
      margin: 0;
      padding: 0;
    }
    nav ul li a {
      color: white;
      text-decoration: none;
      font-weight: 500;
    }
    nav ul li a:hover {
      text-decoration: underline;
    }
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        .container {
            margin-left: 300px;
            margin-right: 300px;
        
        }

        form {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 15px;
            padding: 12px;
            width: 100%;
            background-color:#1E3A8A ;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1E3A8A;
        }

            footer {
      background-color: #1E3A8A;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 20px;
      
      
    }

 
    </style>
</head>
<body>
    
   <nav>
    <div class="logo">NyondoStock</div>
    <ul>
      <li><a href="{% url 'index' %}">Home</a></li>
      <li><a href="{% url 'sales' %}">Sales</a></li>
      <li><a href="{% url 'save' %}">Sales view</a></li>

    </ul>
  </nav>

<div class="container">
    <h2>Supply Management</h2>

    <form method="POST" action="{% url 'edit_supplier' supplier.id %}">
        {% csrf_token %}

        <label>Item</label>
        <select name="stock" required>
            {% for item in stocks %}
                <option value="{{ item.id }}">{{ item.name }}</option>
            {% endfor %}
        </select>

        <label>Supplier</label>
        <input  type="text" name="supplier_name" value="{{ supplier.supplier_name }}" required> 

        <label>quatity</label>
        <input type="number" name="quantity" value="{{ supplier.quantity }}" required>


     <label> cost_price</label>
     <input type="number" name="cost_price" value="{{ supplier.cost_price }}" required>

        <label>Date Supplied</label>
        <input type="date" name="date" value="{{ supplier.date }}" required>

   <select name="method_of_payment" required>
    <option value="cash" {% if supplier.method_of_payment == "cash" %}selected{% endif %}>Cash</option>
    <option value="credit" {% if supplier.method_of_payment == "credit" %}selected{% endif %}>Credit</option>
</select>


        <label>Amount Paid</label>
        <input type="number" name="amount_paid" value="{{ supplier.amount_paid }}" placeholder="Enter amount paid (if credit)">

        <button type="submit">Add Supply</button>
    </form>
    </div>

     <footer>
    &copy; 2026 NyondoStock Hardware Inventory System
  </footer>

</body>
</html>
