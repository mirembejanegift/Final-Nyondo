<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Stock - NyondoStock</title>
  <script src="https://kit.fontawesome.com/622a1b9c56.js" crossorigin="anonymous"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #E5E7EB;
      color: #374151;
    }

    nav {
      background-color: #1E3A8A;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav .logo {
      font-weight: bold;
      font-size: 1.2rem;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 1.5rem;
      margin: 0;
      padding: 0;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
    }

    nav ul li a i {
      margin-right: 0.35rem;
    }

    h1 {
      text-align: center;
      color: #1E3A8A;
      margin-top: 20px;
    }

    .container {
      max-width: 600px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background-color: #1E3A8A;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .submit-btn:hover {
      background-color: #374151;
    }

    footer {
      background-color: #1E3A8A;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">NyondoStock</div>
  <ul>
    <li><a href="#"><i class="fa-solid fa-house"></i>Home</a></li>
    <li><a href="#"><i class="fa-solid fa-chart-line"></i>Dashboard</a></li>
    <li><a href="#"><i class="fa-solid fa-cart-shopping"></i>Sales</a></li>
    <li><a href="#"><i class="fa-solid fa-boxes-stacked"></i>Stock</a></li>
    <li><a href="#"><i class="fa-solid fa-money-check-dollar"></i>Deposit</a></li>
  </ul>
</nav>

<h1>Edit Stock</h1>

<div class="container">

  <form method="post" action="{% url 'edit_stock' stock.id %}">
    {% csrf_token %}

    <!-- Product Name -->
    <div class="form-group">
      <label>Product Name</label>
      <input type="text" name="product" value="{{ stock.name }}" required>
    </div>

    <!-- Category -->
    <div class="form-group">
      <label>Category</label>
      <select name="category" required>
        <option value="">Select Category</option>
        <option value="Building Materials" {% if stock.category == "Building Materials" %}selected{% endif %}>Building Materials</option>
        <option value="Hardware" {% if stock.category == "Hardware" %}selected{% endif %}>Hardware</option>
        <option value="Roofing" {% if stock.category == "Roofing" %}selected{% endif %}>Roofing</option>
        <option value="Electrical" {% if stock.category == "Electrical" %}selected{% endif %}>Electrical</option>
      </select>
    </div>

    <!-- Quantity -->
    <div class="form-group">
      <label>Quantity in Stock</label>
      <input type="number" name="quantity" value="{{ stock.quantity }}" required>
    </div>

    <!-- Cost Price -->
    <div class="form-group">
      <label>Cost Price</label>
      <input type="number" name="cost_price" value="{{ stock.cost_price }}" required>
    </div>

    <!-- Selling Price -->
    <div class="form-group">
      <label>Selling Price</label>
      <input type="number" name="selling_price" value="{{ stock.selling_price }}" required>
    </div>

    <!-- Date -->
    <div class="form-group">
      <label>Date</label>
      <input type="date" name="date" value="{{ stock.date|date:'Y-m-d' }}" required>
    </div>

    <!-- Supplier -->
    <div class="form-group">
      <label>Supplier</label>
      <input type="text" name="supplier" value="{{ stock.supplier }}">
    </div>

    <!-- Specifications -->
    <div class="form-group">
      <label>Specification</label>
      <select name="specifications">
        <option value="">Select Specification</option>
        <option value="Small" {% if stock.specifications == "Small" %}selected{% endif %}>Small</option>
        <option value="Medium" {% if stock.specifications == "Medium" %}selected{% endif %}>Medium</option>
        <option value="Large" {% if stock.specifications == "Large" %}selected{% endif %}>Large</option>
      </select>
    </div>

    <!-- Payment -->
    <div class="form-group">
      <label>Mode of Payment</label>
      <select name="payment">
        <option value="">Select Payment Mode</option>
        <option value="Cash" {% if stock.payment == "Cash" %}selected{% endif %}>Cash</option>
        <option value="Credit" {% if stock.payment == "Credit" %}selected{% endif %}>Credit</option>
        <option value="Mobile Money" {% if stock.payment == "Mobile Money" %}selected{% endif %}>Mobile Money</option>
      </select>
    </div>

    <button type="submit" class="submit-btn">Update Stock</button>

  </form>

</div>

<footer>
  &copy; 2026 NyondoStock Hardware Inventory System
</footer>

</body>
</html>
