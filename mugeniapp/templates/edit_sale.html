<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Edit Sale - NyondoStock</title>

  <style>
    body {
      font-family: Arial;
      background:  #e6ecff;
      margin: 0;
    }

    .container {
      max-width: 600px;
      margin: 40px auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #1E3A8A;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: #1E3A8A;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #374151;
    }

    .messages {
      color: red;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>Edit Sale</h2>

  <!-- Messages -->
  {% if messages %}
    <div class="messages">
      {% for message in messages %}
        <p>{{ message }}</p>
      {% endfor %}
    </div>
  {% endif %}

  <form method="POST" action="{% url 'edit_sale' sale.id %}">
    {% csrf_token %}

    <!-- PRODUCT DROPDOWN (FIXED) -->
    <label>Product</label>
    <select name="name" required>
      {% for stock in stocks %}
        <option value="{{ stock.id }}"
          {% if sale.name.id == stock.id %}selected{% endif %}>
          {{ stock.name }}
        </option>
      {% endfor %}
    </select>

    <label>Quantity</label>
    <input type="number" name="quantity" value="{{ sale.quantity }}" required>

    
    <label>Distance (KM)</label>
    <input type="number" step="0.1" name="distance" value="{{ sale.distance }}" required>

    <label>Date</label>
    <input type="date" name="date" value="{{ sale.date|date:'Y-m-d' }}" required>

    <label>Customer Name</label>
    <input type="text" name="customer_name" value="{{ sale.customer_name }}" required>

    <label>Customer Contact</label>
    <input type="text" name="customer_contact" value="{{ sale.customer_contact }}" required>

    <button type="submit">Update Sale</button>

  </form>

</div>

</body>
</html>
