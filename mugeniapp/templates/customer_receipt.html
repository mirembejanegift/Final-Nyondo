<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Receipt</title>

    <style>
        body {
            font-family: Arial;
            background: #e6ecff ;
            padding: 30px;
        }

        .receipt {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
            color: #1E3A8A;
        }

        .details {
            margin-top: 20px;
        }

        .details p {
            margin: 8px 0;
        }

        .total {
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
        }

        .print-btn {
            margin-top: 20px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            background: #1E3A8A;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

    </style>
</head>
<body>

<div class="receipt">
    <h2>NyondoStock Receipt</h2>

    <div class="details">
        <p><strong>Name:</strong> {{ customer.name }}</p>
        <p><strong>NIN:</strong> {{ customer.nin }}</p>
        <p><strong>Email:</strong> {{ customer.email }}</p>
        <p><strong>Contact:</strong> {{ customer.contact }}</p>
        <p><strong>Product:</strong> {{ customer.product }}</p>
    </div>

    <div class="total">
        Total Amount: UGX {{ customer.amount }}
    </div>

    <div class="print-btn">
        <button onclick="window.print()">Print Receipt</button>
    </div>
</div>

</body>
</html>
