<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NyondoStock Sales</title>

  <script src="https://kit.fontawesome.com/622a1b9c56.js" crossorigin="anonymous"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    body{
      background-color:#f4f6f9;
      font-family: Arial, sans-serif;
    }

    /* NAVBAR */

    .navbar{
      background-color:#1E3A8A;
      padding:15px 30px;
    }

    .navbar-brand{
      color:white;
      font-size:24px;
      font-weight:bold;
    }

    .navbar-brand:hover{
      color:white;
    }

    .nav-link{
      color:white !important;
      margin-left:15px;
      transition:0.3s;
    }

    .nav-link:hover{
      color:#cbd5ff !important;
    }

    .nav-link i {
      margin-right: 0.35rem;
    }

    /* FORM CARD */

    .sales-card{
      background:white;
      border-radius:15px;
      padding:35px;
      box-shadow:0 4px 15px rgba(0,0,0,0.1);
      margin-top:40px;
      margin-bottom:40px;
    }

    .sales-title{
      color:#1E3A8A;
      font-weight:bold;
      margin-bottom:25px;
      text-align:center;
    }

    /* FORM */

    .form-label{
      font-weight:600;
      margin-bottom:6px;
    }

    .form-control,
    .form-select{
      padding:12px;
      border-radius:10px;
      border:1px solid #d1d5db;
    }

    .form-control:focus,
    .form-select:focus{
      border-color:#1E3A8A;
      box-shadow:none;
    }

    /* BUTTON */

    .btn-save{
      background:#1E3A8A;
      color:white;
      padding:12px;
      border:none;
      border-radius:10px;
      font-size:17px;
      font-weight:bold;
      transition:0.3s;
      width:100%;
    }

    .btn-save:hover{
      background:#294bb8;
    }

    /* MESSAGE */

    .message-box{
      padding:12px;
      border-radius:8px;
      margin-bottom:15px;
      text-align:center;
      font-weight:bold;
    }

    .success{
      background:#d1fae5;
      color:#065f46;
    }

    .error{
      background:#fee2e2;
      color:#991b1b;
    }

    /* FOOTER */

    footer{
      background:#1E3A8A;
      color:white;
      text-align:center;
      padding:15px;
      margin-top:40px;
    }

  </style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg">

  <div class="container-fluid">

    <a class="navbar-brand" href="#">
      NyondoStock
    </a>

    <button class="navbar-toggler bg-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">

      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <a class="nav-link" href="{% url 'index' %}">
            <i class="fa-solid fa-house"></i>Home
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="{% url 'sales' %}">
            <i class="fa-solid fa-cart-shopping"></i>Sales
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="{% url 'save' %}">
            <i class="fa-solid fa-table-list"></i>Sales View
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="{% url 'customer' %}">
            <i class="fa-solid fa-people-group"></i>Customers
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="{% url 'customer_list' %}">
            <i class="fa-solid fa-user-plus"></i>Customer List
          </a>
        </li>

      </ul>

    </div>

  </div>

</nav>

<!-- MAIN CONTENT -->

<div class="container">

  <div class="row justify-content-center">

    <div class="col-lg-8">

      <div class="sales-card">

        <h2 class="sales-title">
          Sales Management
        </h2>

        <!-- DJANGO MESSAGES -->

        {% if messages %}
          {% for message in messages %}

            <div class="message-box {% if message.tags == 'success' %}success{% else %}error{% endif %}">
              {{ message }}
            </div>

          {% endfor %}
        {% endif %}

        <!-- FORM -->

        <form method="POST">

          {% csrf_token %}

          <div class="row">

            <!-- ITEM -->

            <div class="col-md-6 mb-3">

              <label class="form-label">
                Select Item
              </label>

              <select name="name" class="form-select" required>

                <option value="">
                  -- Choose Product --
                </option>

                {% for stock in stocks %}

                <option value="{{ stock.id }}">
                  {{ stock.name }}
                </option>

                {% endfor %}

              </select>

            </div>

            <!-- QUANTITY -->

            <div class="col-md-6 mb-3">

              <label class="form-label">
                Quantity
              </label>

              <input type="number"
                     name="quantity"
                     class="form-control"
                     placeholder="Enter quantity"
                     required>

            </div>

            <!-- UNIT PRICE -->

            <div class="col-md-6 mb-3">

              <label class="form-label">
                Unit Price
              </label>

              <input type="number"
                     name="unit_price"
                     class="form-control"
                     placeholder="Enter unit price"
                     required>

            </div>

            <!-- DISTANCE -->

            <div class="col-md-6 mb-3">

              <label class="form-label">
                Delivery Distance (KM)
              </label>

              <input type="number"
                     step="0.1"
                     name="distance"
                     class="form-control"
                     placeholder="Enter distance"
                     required>

            </div>

            <!-- DATE -->

            <div class="col-md-6 mb-3">

              <label class="form-label">
                Date
              </label>

              <input type="date"
                     name="date"
                     class="form-control"
                     required>

            </div>

            <!-- CUSTOMER NAME -->

            <div class="col-md-6 mb-3">

              <label class="form-label">
                Customer Name
              </label>

              <input type="text"
                     name="customer_name"
                     class="form-control"
                     placeholder="Enter customer name"
                     required>

            </div>

            <!-- CONTACT -->

            <div class="col-12 mb-4">

              <label class="form-label">
                Customer Contact
              </label>

              <input type="tel"
                     name="customer_contact"
                     class="form-control"
                     pattern="\d{10}"
                     maxlength="10"
                     minlength="10"
                     placeholder="0700000000"
                     required>

            </div>

          </div>

          <!-- BUTTON -->

          <button type="submit" class="btn-save">
            Save Sale
          </button>

        </form>

      </div>

    </div>

  </div>

</div>

<!-- FOOTER -->

<footer>
  © 2026 NyondoStock Hardware Inventory System
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
