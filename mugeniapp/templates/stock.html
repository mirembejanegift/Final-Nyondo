<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NyondoStock - Add Stock</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            background: #f1f5f9;
            font-family: 'Segoe UI', sans-serif;
            color: #334155;
        }

        /* NAVBAR */

        .navbar{
            background:#1E3A8A ;
            padding: 15px 40px;
        }

        .navbar-brand{
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .navbar-brand:hover{
            color: white;
        }

        .nav-link{
            color: #cbd5e1 !important;
            margin-left: 15px;
            transition: 0.3s;
        }

        .nav-link:hover{
            color: white !important;
        }

        /* PAGE TITLE */

        .page-title{
            text-align: center;
            margin-top: 40px;
            margin-bottom: 30px;
        }

        .page-title h1{
            font-weight: bold;
            color: #0f172a;
        }

        .page-title p{
            color: gray;
        }

        /* FORM CARD */

        .form-container{
            max-width: 750px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            margin-bottom: 50px;
        }

        .section-title{
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #1e293b;
        }

        /* FORM */

        .form-label{
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-control,
        .form-select{
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
        }

        .form-control:focus,
        .form-select:focus{
            border-color: #2563eb;
            box-shadow: 0 0 0 0.15rem rgba(37,99,235,0.25);
        }

        /* BUTTON */

        .submit-btn{
            background: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            font-size: 17px;
            transition: 0.3s;
        }

        .submit-btn:hover{
            background: #1d4ed8;
        }

        /* FOOTER */

        footer{
            background: #1E3A8A ;
            color: white;
            text-align: center;
            padding: 18px;
            margin-top: 30px;
        }

    </style>

</head>
<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg">

        <div class="container-fluid">

            <a class="navbar-brand" href="#">
                NyondoStock
            </a>

            <button class="navbar-toggler bg-light"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse"
            id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link"
                        href="{% url 'index' %}">
                        <i class="bi bi-house"></i> Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                        href="{% url 'add' %}">
                        <i class="bi bi-eye"></i> Stock View
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                        href="{% url 'stock' %}">
                        <i class="bi bi-box-seam"></i> Stock
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                        href="{% url 'supplier' %}">
                        <i class="bi bi-truck"></i> Supplier
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                        href="{% url 'supplier_view' %}">
                        <i class="bi bi-people"></i> Supplier View
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- PAGE TITLE -->

    <div class="page-title">

        <h1>Add New Stock Item</h1>

        <p>Manage and track hardware inventory easily</p>

    </div>

    <!-- FORM -->

    <div class="form-container">

        <div class="section-title">
            Product Information
        </div>

        <form method="post"
        action="{% url 'stock' %}">

            {% csrf_token %}

            <div class="row">

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Product Name
                    </label>

                    <input type="text"
                    name="product"
                    class="form-control"
                    value="{{ stock.product }}"
                    required>

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Category
                    </label>

                    <select name="category"
                    class="form-select"
                    required>

                        <option value="">
                            Select Category
                        </option>

                        <option>
                            Building Materials
                        </option>

                        <option>
                            Hardware
                        </option>

                        <option>
                            Roofing
                        </option>

                        <option>
                            Electrical
                        </option>

                    </select>

                </div>

            </div>

            <div class="row">

                <div class="col-md-4 mb-4">

                    <label class="form-label">
                        Quantity
                    </label>

                    <input type="number"
                    name="quantity"
                    class="form-control"
                    required>

                </div>

                <div class="col-md-4 mb-4">

                    <label class="form-label">
                        Cost Price
                    </label>

                    <input type="number"
                    name="cost_price"
                    class="form-control"
                    required>

                </div>

                <div class="col-md-4 mb-4">

                    <label class="form-label">
                        Selling Price
                    </label>

                    <input type="number"
                    name="selling_price"
                    class="form-control">

                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Date
                    </label>

                    <input type="date"
                    name="date"
                    class="form-control"
                    value="{{ stock.date }}"
                    min="{{ one_week_ago }}"
                    max="{{ today }}"
                    required>

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Mode of Payment
                    </label>

                    <select name="payment"
                    class="form-select">

                        <option value="">
                            Select Payment Mode
                        </option>

                        <option>
                            Cash
                        </option>

                        <option>
                            Credit
                        </option>

                        <option>
                            Mobile Money
                        </option>

                    </select>

                </div>

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Specification
                </label>

                <select name="specifications"
                class="form-select">

                    <option value="">
                        Select Specification
                    </option>

                    <optgroup label="Cement">
                        <option>32.5R</option>
                        <option>42.5N</option>
                    </optgroup>

                    <optgroup label="Iron Bars">
                        <option>10mm</option>
                        <option>12mm</option>
                        <option>16mm</option>
                    </optgroup>

                    <optgroup label="Nails">
                        <option>1 inch</option>
                        <option>3 inch</option>
                        <option>4 inch</option>
                        <option>5 inch</option>
                        <option>Roofing Nails</option>
                    </optgroup>

                    <optgroup label="Barbed Wires">
                        <option>High Tensile</option>
                        <option>Low Tensile</option>
                    </optgroup>

                </select>

            </div>

            <button type="submit"
            class="submit-btn">

                <i class="bi bi-plus-circle"></i>
                Add Stock Item

            </button>

        </form>

    </div>

    <!-- FOOTER -->

    <footer>

        © 2026 NyondoStock Hardware Inventory System

    </footer>

</body>
</html>
