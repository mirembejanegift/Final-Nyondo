<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="login.css" />
    <style>
        .container {
  height: 100vh;
  background-color:white;
   text-align: center; 
  margin-top: 80px;
  margin-right: 380px;
  margin-bottom: 10px;
  margin-left: 380px;
  height: 100vh;
  border-radius: 10px;
}
body {
  background: #1E3A8A;
  background-repeat: no-repeat;
}
.header {
  padding: 10px;
  margin-top: 25px;
  margin-bottom: 15px;
}
button {
  background-color:#5b7394 ;
  border-radius: 10px;
  width: 90%;
  height: 50px;
  color: white;
}
/* button:hover{
    background-color: rgb(4, 4, 62);
} */
input {
  font-size: 30px;
  width: 90%;
  border-radius: 10px;
  background-color: white;
  
}
label {
  font-size: 25px;
  text-align: left;
  display: block;
  margin-left: 30px;
}
p {
  font-size: 20px;
}
a {
  color: purple;
}
input::placeholder {
  font-size: 15px;
padding: 5px;
}

    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Welcome Back!</h1>
      </div>
      <form>
        <label for="email">Email:</label>
        <input
          type="text"
          id="email"
          name="emai"
          placeholder="Username"
          required
        /><br />
        <label for="password">Password:</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="password"
          required
        /><br /><br />
        <button type="submit">LOGIN</button>
        <p>Don't have an account? <a href="{% url 'sing_up' %}">Sign up</a></p>

      </form>
    </div>
  </body>
</html>
