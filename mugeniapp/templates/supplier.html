<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>NyondoStock - Supply Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            background: #f1f5f9;
            font-family: 'Segoe UI', sans-serif;
            color: #334155;
        }

        /* NAVBAR */

        .navbar{
            background:#1E3A8A ;
            padding: 15px 40px;
        }

        .navbar-brand{
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .navbar-brand:hover{
            color: white;
        }

        .nav-link{
            color: #cbd5e1 !important;
            margin-left: 15px;
            transition: 0.3s;
        }

        .nav-link:hover{
            color: white !important;
        }

        /* PAGE TITLE */

        .page-title{
            text-align: center;
            margin-top: 40px;
            margin-bottom: 30px;
        }

        .page-title h2{
            font-weight: bold;
            color: #1E3A8A;
        }

        .page-title p{
            color: gray;
        }

        /* FORM CONTAINER */

        .form-container{
            max-width: 850px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            margin-bottom: 50px;
        }

        .section-title{
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #1E3A8A;
        }

        /* FORM */

        .form-label{
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-control,
        .form-select{
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
        }

        .form-control:focus,
        .form-select:focus{
            border-color: #2563eb;
            box-shadow: 0 0 0 0.15rem rgba(37,99,235,0.25);
        }

        /* BUTTON */

        .submit-btn{
            background: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            font-size: 17px;
            transition: 0.3s;
        }

        .submit-btn:hover{
            background: #1d4ed8;
        }

        /* FOOTER */

        footer{
            background: #1E3A8A;
            color: white;
            text-align: center;
            padding: 18px;
            margin-top: 30px;
        }

    </style>

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg">

        <div class="container-fluid">

            <a class="navbar-brand" href="#">
                NyondoStock
            </a>

            <button class="navbar-toggler bg-light"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse"
            id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link"
                        href="{% url 'index' %}">
                        <i class="bi bi-house"></i> Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                        href="{% url 'sales' %}">
                        <i class="bi bi-cash-stack"></i> Sales
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                        href="{% url 'save' %}">
                        <i class="bi bi-eye"></i> Sales View
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                        href="{% url 'supplier' %}">
                        <i class="bi bi-truck"></i> Supplier
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                        href="{% url 'supplier_view' %}">
                        <i class="bi bi-people"></i> Supplier View
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- PAGE TITLE -->

    <div class="page-title">

        <h2>Supply Management</h2>

        <p>Add and manage supplier deliveries efficiently</p>

    </div>

    <!-- FORM -->

    <div class="form-container">

        <form method="POST"
        action="{% url 'supplier' %}">

            {% csrf_token %}

            <!-- PRODUCT DETAILS -->

            <div class="section-title">
                Product Details
            </div>

            <div class="row">

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Item
                    </label>

                    <select name="stock"
                    class="form-select"
                    required>

                        {% for item in stocks %}

                        <option value="{{ item.id }}">
                            {{ item.name }}
                        </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Quantity
                    </label>

                    <input type="number"
                    name="quantity"
                    class="form-control"
                    required>

                </div>

            </div>

            <!-- SUPPLIER DETAILS -->

            <div class="section-title">
                Supplier Details
            </div>

            <div class="row">

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Supplier Name
                    </label>

                    <input type="text"
                    name="supplier_name"
                    class="form-control"
                    required>

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Supplier Contact
                    </label>

                    <input type="text"
                    name="supplier_contact"
                    class="form-control"
                    required>

                </div>

            </div>

            <!-- PAYMENT DETAILS -->

            <div class="section-title">
                Payment Details
            </div>

            <div class="row">

                <div class="col-md-4 mb-4">

                    <label class="form-label">
                        Cost Price
                    </label>

                    <input type="number"
                    name="cost_price"
                    class="form-control"
                    required>

                </div>

                <div class="col-md-4 mb-4">

                    <label class="form-label">
                        Date Supplied
                    </label>

                    <input type="date"
                    name="date"
                    class="form-control"
                    min="{{ one_week_ago }}"
                    max="{{ today }}"
                    required>

                </div>

                <div class="col-md-4 mb-4">

                    <label class="form-label">
                        Payment Method
                    </label>

                    <select name="method_of_payment"
                    class="form-select"
                    required>

                        <option value="cash">
                            Cash
                        </option>

                        <option value="credit">
                            Credit
                        </option>

                    </select>

                </div>

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Amount Paid
                </label>

                <input type="number"
                name="amount_paid"
                class="form-control"
                placeholder="Enter amount paid if on credit">

            </div>

            <!-- BUTTON -->

            <button type="submit"
            class="submit-btn">

                <i class="bi bi-plus-circle"></i>
                Add Supply Record

            </button>

        </form>

    </div>

    <!-- FOOTER -->

    <footer>

        © 2026 NyondoStock Hardware Inventory System

    </footer>

</body>
</html>
