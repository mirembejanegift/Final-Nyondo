<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sign in</title>
    <style>
      body {
        background-color:  #1e3a8a;
      }
      .container {
        margin-left: 400px;
        margin-right: 400px;
        margin-top: 50pxx;
        margin-bottom: 50px;
        padding: 30px;
        border-radius: 10px;
        background-color: white;
      }
      input {
        width: 100%;
        gap: 50;
        padding: 5px;
        border-radius: 5px;
        outline: none;
        margin-top: 15px;
        height: 25px;
        font-size: 20px;
      }
      select {
        width: 100%;
        gap: 50;
        padding: 5px;
        border-radius: 5px;
        outline: none;
        margin-top: 25px;
        height: 30px;
      }

      button {
        width: 100%;
        margin-top: 20px;
        background-color: #5b7394;
        border-radius: 5px;
        height: 30px;
      }
      .form {
        padding: 15px;
      }
      .head{
        text-align: center;
        font-size: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="head">
        <h2>Nyondo hardware</h2>
        <p>Create account</p>
      </div>
      <div class="form">
        <input
          type="text"
          name="full_name"
          placeholder="Full Name"
          required
        /><br />
        <input
          text="text"
          name="User_name"
          placeholder="Username"
          required
        /><br />
        <input
          text="email"
          name="email"
          placeholder="Email Address"
          required
        /><br />
        <input
          text="password"
          name="password"
          placeholder="Password"
          required
        /><br />
        <input
          text="password"
          name="password"
          placeholder=" Confirm Password"
          required
        /><br />
        <!-- <input text="text" name="role" placeholder="Select Role" required> -->
        <select required>
          <option value="">Select Role</option>
          <option value="admin">Admin</option>
          <option value="staff">Staff</option></select
        ><br />
        <button>Register</button>
        <p>Already have account <a href="{% url 'login' %}">Login</a></p>
      </div>
    </div>
  </body>
</html>
